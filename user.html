<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PadelPlay - User Dashboard</title>
    <link rel="stylesheet" href="user.css">
</head>
<body>

    <div id="sidebar">
        <div id="sidebar-logo">
            <h1>PadelPlay</h1>
            <p>User Dashboard</p>
        </div>
        <div id="sidebar-menu">
            <div class="menu-label">Menu Utama</div>
            <a href="user.html" class="menu-item active">Pilih Lapangan</a>
            <a href="#" class="menu-item">Riwayat Sewa</a>
            <a href="#" class="menu-item">Profil Saya</a>
        </div>
        <div id="sidebar-footer">
            <a href="logout.php" id="btn-logout">Logout</a>
        </div>
    </div>

    <div id="main">
        <div id="navbar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button id="menu">☰</button>
                <div style="font-weight: bold; color: #333;">Pesan Lapangan</div>
            </div>
            <div style="background-color: #ffe4f5; color: #cc2e97; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 13px;">Member</div>
        </div>

        <div id="content">
            <h2 style="font-size: 20px; color: #333; margin-bottom: 20px;">Silahkan Pilih Lapangan</h2>
            <div id="daftar-lapangan"></div>
        </div>
    </div>

    <div id="modal-booking" class="modal">
        <div class="modal-box">
            <h3 style="margin-top: 0; color: #333;">Konfirmasi Booking</h3>
            
            <form action="booking_form.php" method="POST">
                <div class="form-group">
                    <label>Nama Lapangan</label>
                    <input type="text" name="lapangan" id="input-lapangan" readonly style="background: #f0f0f0;">
                </div>
                <div class="form-group">
                    <label>Pilih Tanggal</label>
                    <input type="date" name="tanggal" id="input-tanggal" required>
                </div>
                <div class="form-group">
                    <label>Pilih Waktu</label>
                    <input type="time" name="waktu" required>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="tutupBooking()" style="border:none; background:none; cursor:pointer; color:#777;">Batal</button>
                    <button type="submit" class="btn-pink" style="width:auto; margin-top:0;">Booking Sekarang</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const btnMenu = document.getElementById('menu');
        const sidebar = document.getElementById('sidebar');
        const main = document.getElementById('main');

        btnMenu.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
            main.classList.toggle('full');
        });

        function loadLapangan() {
            fetch("daftar_lapangan.php")
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('daftar-lapangan');
                    container.innerHTML = data.filter(l => l.status.toLowerCase() === 'aktif').map(l => `
                        <div class="court-card">
                            <h3 style="margin:0;">${l.nama}</h3>
                            <p style="color:#777; font-size:13px; margin: 10px 0;">Harga: <b>Rp ${parseInt(l.harga).toLocaleString('id-ID')} / Jam</b></p>
                            <button class="btn-pink" onclick="bukaBooking('${l.nama}')">Booking Sekarang</button>
                        </div>
                    `).join('');
                });
        }

        function bukaBooking(nama) {
            document.getElementById('modal-booking').style.display = 'flex';
            document.getElementById('input-lapangan').value = nama;
            document.getElementById('input-tanggal').valueAsDate = new Date();
            document.getElementById('input-tanggal').min = new Date().toISOString().split("T")[0];
        }

        function tutupBooking() {
            document.getElementById('modal-booking').style.display = 'none';
        }

        document.addEventListener("DOMContentLoaded", loadLapangan);
    </script>
</body>
</html>
